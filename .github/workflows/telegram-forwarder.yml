name: Moneyzon Telegram Forwarder

on:
  workflow_dispatch:
  schedule:
    - cron: "*/1 * * * *"

permissions:
  contents: write

concurrency:
  group: telegram-forwarder
  cancel-in-progress: false

jobs:
  run-forwarder:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run forwarder
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          USER_SESSION: ${{ secrets.USER_SESSION }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

          SOURCE_CHANNEL_IDS: "-1001458177744,-1001667757195"
          DEST_CHANNEL_ID: "-1003604902453"

          EXTRAPAY_BOT_USERNAME: "ExtraPeBot"

          FOOTER_TEXT: "Powered by Moneyzon"
          FOOTER_LINK: "https://t.me/+Pn4M2jtiFZBhMDhl"

        run: python app.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update forwarder state"
          git push
